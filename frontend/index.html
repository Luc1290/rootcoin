<!DOCTYPE html>
<html lang="fr" class="bg-gray-950 text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="icon" type="image/png" href="/static/icon-192.png">
    <title>RootCoin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header + Navigation -->
    <header class="app-header shrink-0 px-4 py-2.5 flex flex-wrap sm:flex-nowrap items-center gap-x-4 gap-y-1">
        <img src="/static/logo.svg" alt="RootCoin" style="height:36px;width:auto" class="shrink-0 sm:order-1">
        <div class="flex items-center gap-3 text-sm text-gray-400 shrink-0 ml-auto sm:ml-0 sm:order-3">
            <span id="clock" class="font-medium tabular-nums"></span>
            <span id="ws-status" class="ws-dot w-2 h-2 rounded-full bg-red-500" title="Disconnected"></span>
        </div>
        <nav class="flex gap-1.5 w-full sm:w-auto sm:flex-1 sm:justify-center sm:order-2">
            <button class="tab-btn active px-4 py-2 text-sm font-medium flex-1 sm:flex-none sm:min-w-[70px]" data-tab="positions">Positions</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium flex-1 sm:flex-none sm:min-w-[70px]" data-tab="trades">Cycles</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium flex-1 sm:flex-none sm:min-w-[70px]" data-tab="fills">Trades</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium flex-1 sm:flex-none sm:min-w-[70px]" data-tab="balances">Balances</button>
        </nav>
    </header>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto">
        <!-- Positions view -->
        <div id="view-positions" class="view p-4">
            <div id="positions-empty" class="empty-state">
                <div class="empty-state-icon">📊</div>
                <div class="empty-state-text">Aucune position ouverte</div>
            </div>
            <div id="positions-list" class="space-y-3 hidden"></div>
        </div>

        <!-- Trades/Cycles view -->
        <div id="view-trades" class="view p-4 hidden">
            <div class="flex items-center gap-2 mb-4">
                <select id="cycles-filter" class="px-3 py-2.5 text-sm flex-1">
                    <option value="">Tous les symboles</option>
                </select>
                <select id="cycles-status" class="px-3 py-2.5 text-sm">
                    <option value="">Tous</option>
                    <option value="closed">Fermés</option>
                    <option value="open">Ouverts</option>
                </select>
            </div>
            <div id="cycles-stats" class="grid grid-cols-3 gap-2 mb-4 text-center text-sm">
                <div class="stat-card">
                    <div class="metric-label mb-1">Win Rate</div>
                    <div id="stat-winrate" class="font-bold text-base">--</div>
                </div>
                <div class="stat-card">
                    <div class="metric-label mb-1">Total PnL</div>
                    <div id="stat-total-pnl" class="font-bold text-base">--</div>
                </div>
                <div class="stat-card">
                    <div class="metric-label mb-1">Cycles</div>
                    <div id="stat-total-cycles" class="font-bold text-base">--</div>
                </div>
            </div>
            <div id="cycles-list" class="space-y-2.5"></div>
            <div id="cycles-empty" class="empty-state hidden">
                <div class="empty-state-icon">🔄</div>
                <div class="empty-state-text">Aucun cycle</div>
            </div>
        </div>

        <!-- Fills view -->
        <div id="view-fills" class="view p-4 hidden">
            <div class="mb-4">
                <select id="trades-filter" class="px-3 py-2.5 text-sm w-full">
                    <option value="">Tous les symboles</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="text-left">Date</th>
                            <th class="text-left">Symbole</th>
                            <th class="text-left">Side</th>
                            <th class="text-right">Prix</th>
                            <th class="text-right">Qty</th>
                            <th class="text-right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="trades-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- Balances view -->
        <div id="view-balances" class="view p-4 hidden">
            <div class="portfolio-hero mb-4 flex items-baseline justify-between">
                <span class="text-xl text-gray-400 font-semibold">Valeur totale</span>
                <span id="portfolio-total" class="portfolio-value text-xl font-bold tracking-tight">--</span>
            </div>
            <div class="mb-4">
                <div class="flex gap-2 mb-3">
                    <button class="chart-range-btn active text-xs px-3 py-1.5 font-medium" onclick="Balances.setChartRange(24)" data-hours="24">24h</button>
                    <button class="chart-range-btn text-xs px-3 py-1.5 font-medium text-gray-400" onclick="Balances.setChartRange(168)" data-hours="168">7d</button>
                    <button class="chart-range-btn text-xs px-3 py-1.5 font-medium text-gray-400" onclick="Balances.setChartRange(720)" data-hours="720">30d</button>
                </div>
                <div id="portfolio-chart" style="height:200px; width:100%;"></div>
            </div>
            <div id="balances-list" class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="text-left">Asset</th>
                            <th class="text-center">Quantité</th>
                            <th class="text-center">USD</th>
                            <th class="text-center border-l border-gray-800/50 pl-4 pr-2">Total</th>
                        </tr>
                    </thead>
                    <tbody id="balances-tbody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal-overlay" class="fixed inset-0 hidden z-50 flex items-end sm:items-center justify-center">
        <div id="modal-content" class="rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md p-6">
            <h3 id="modal-title" class="text-lg font-bold mb-4"></h3>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/position-cards.js"></script>
    <script src="/static/js/positions.js"></script>
    <script src="/static/js/cycles.js"></script>
    <script src="/static/js/trades.js"></script>
    <script src="/static/js/balances.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
